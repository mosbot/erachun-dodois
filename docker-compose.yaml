version: "3.8"

services:
  web:
    build: .
    container_name: e-rachun-dodois
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./config.local.yaml:/app/config.local.yaml:ro
      - invoice_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ERACUN_CONFIG=/app/config.yaml
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: e-rachun-dodois-postgres
    environment:
      POSTGRES_DB: e_rachun_dodois
      POSTGRES_USER: eracun
      POSTGRES_PASSWORD: eracun_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eracun -d e_rachun_dodois"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  invoice_data:
