version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    container_name: e-rachun-caddy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

  web:
    build: .
    container_name: e-rachun-dodois
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./config.local.yaml:/app/config.local.yaml:ro
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ERACUN_CONFIG=/app/config.yaml
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: e-rachun-dodois-postgres
    environment:
      POSTGRES_DB: e_rachun_dodois
      POSTGRES_USER: eracun
      POSTGRES_PASSWORD: eracun_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eracun -d e_rachun_dodois"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  invoice_data:
  caddy_data:
  caddy_config:
