# =============================================
# e-rachun - DodoIs — Configuration
# =============================================

# moj-eRačun API credentials
eracun:
  base_url: "https://www.moj-eracun.hr/apis/v2"
  # Demo: "https://demo.moj-eracun.hr/apis/v2"
  username: ""          # Email or ID from MER
  password: ""          # Login password
  software_id: ""       # ERP identifier from MER
  company_id: "52219073449"  # OIB of Orange food business d.o.o.
  company_bu: ""        # Business Unit (optional)

# Sync settings
sync:
  interval_minutes: 30        # How often to check for new invoices
  lookback_days: 90           # How far back to query on first sync
  auto_download_pdf: true     # Automatically download PDF attachments
  auto_download_xml: true     # Automatically download XML source

# Users (passwords are bcrypt hashed)
# Generate hash: python -c "import bcrypt; print(bcrypt.hashpw(b'password', bcrypt.gensalt()).decode())"
users:
  andrey:
    name: "Andrey Koval"
    email: "koval.dodo@gmail.com"
    password: "$2b$12$placeholder_hash_replace_me"
    role: "admin"
  # Add more users:
  # user2:
  #   name: "User Name"
  #   email: "user@example.com"
  #   password: "$2b$12$..."
  #   role: "viewer"

# Suppliers with Dodois integration enabled
# Only suppliers listed here will have "Upload to Dodois" option
#
# Fields:
#   eracun_name      — exact SenderBusinessName from moj-eRačun (used for matching in DB)
#   eracun_oib       — OIB of the supplier in eRačun (primary match key)
#   dodois_name      — supplier name as it appears in Dodois UI (for reference)
#   dodois_supplier_id — supplier GUID in Dodois API
#   enabled          — set to false to disable upload without removing the entry
