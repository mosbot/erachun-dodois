# Dodois connection
dodois:
  base_url: "https://officemanager.dodois.com"
  # Bearer token for API calls (Settings → "Sync Dodois Catalog").
  # Get it from browser DevTools: open Dodois, F12 → Network → any request → Authorization header.
  token: ""
  pizzerias:
    zagreb-1:
      name: "Zagreb-1"
      department_id: "E67B8C27D336AE8311EDE29371DEF8F6"
      unit_id: "e67b8c27d336ae8611ede2943f258e31"
    zagreb-2:
      name: "Zagreb-2"
      department_id: ""  # TODO: fill in
      unit_id: ""

# Database
database:
  url: "postgresql://eracun:eracun_secret@postgres:5432/e_rachun_dodois"

# Storage
storage:
  pdf_dir: "/app/data/pdfs"
  xml_dir: "/app/data/xmls"
